server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    root /site;
    # Редиректы отдаём относительным путём (без http/host/порта) — корректно за Cloudflare.
    absolute_redirect off;

    # Долгий кэш для неизменяемых ассетов.
    # Медиа раздаётся отдельно из Cloudflare R2 (media.emercoin.com), не отсюда.
    location /static/ {
        access_log off;
        expires 7d;
        try_files $uri =404;
    }

    # Старые i18n-URL из поисковиков: /ru, /en, /ru/<path>, /en/<path>
    # -> английский аналог, постоянным редиректом (301). Сам префикс срезаем.
    #   /ru/news/x -> /news/x   |   /ru -> /   |   /en/ -> /
    location ~ ^/(?:ru|en)(/.*)?$ {
        set $striplang $1;
        if ($striplang = "") { set $striplang /; }
        return 301 $striplang$is_args$args;
    }

    # Статические страницы: <path> -> <path>/index.html
    # HTML не кэшируем на edge (Cloudflare), чтобы деплой отражался сразу.
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/index.html =404;
    }

    error_page 404 /404.html;
}
