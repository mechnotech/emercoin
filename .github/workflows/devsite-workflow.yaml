name: Emercoin dev site (static)

on:
  push:
    branches:
      - dev

jobs:

  build_and_deploy:
    if: contains(github.ref, 'dev')
    runs-on: ubuntu-latest
    env:
      # Сборка заморозки: временный SQLite, никакого Postgres.
      DEBUG: "True"
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: build.sqlite3
      SECRET_KEY: build-only-not-a-secret
      # Медиа берётся из Cloudflare R2, не из репозитория
      MEDIA_URL: https://media.emercoin.com/
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build static site (freeze)
        run: |
          python manage.py migrate --noinput
          python manage.py loaddata fixtures.json
          python manage.py freeze
          # dev окружение не индексируем (перетираем открытый robots)
          printf 'User-agent: *\nDisallow: /\n' > dist/robots.txt

      - name: Guard — no Cyrillic in output
        run: |
          if grep -rlP '[\x{0400}-\x{04FF}]' dist --include=*.html; then
            echo "::error::Cyrillic found in build output (files listed above)"; exit 1
          fi
          echo "OK: no Cyrillic in dist/"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEV_TEST_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.TEST_HOST_ADMIN }}@${{ secrets.DEV_TEST_HOST }} \
            'mkdir -p ~/emercoin-static/nginx ~/emercoin-static/sites/dev ~/emercoin-static/sites/prod'

      - name: Upload nginx config and compose
        run: |
          scp -i ~/.ssh/id_rsa nginx/static-nginx.conf nginx/static.conf \
            ${{ secrets.TEST_HOST_ADMIN }}@${{ secrets.DEV_TEST_HOST }}:~/emercoin-static/nginx/
          scp -i ~/.ssh/id_rsa static.yaml \
            ${{ secrets.TEST_HOST_ADMIN }}@${{ secrets.DEV_TEST_HOST }}:~/emercoin-static/

      - name: Rsync static site (staging)
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_rsa" dist/ \
            ${{ secrets.TEST_HOST_ADMIN }}@${{ secrets.DEV_TEST_HOST }}:~/emercoin-static/sites/dev/

      - name: Start/refresh nginx
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.TEST_HOST_ADMIN }}@${{ secrets.DEV_TEST_HOST }} \
            'cd ~/emercoin-static && (docker compose -f static.yaml up -d --force-recreate \
             || docker-compose -f static.yaml up -d --force-recreate)'

  send_message:
    if: contains(github.ref, 'dev')
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: send message
        uses: appleboy/telegram-action@v0.1.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: Dev (static) - ${{ github.workflow }} deployed successfully!
