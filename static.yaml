# Раздача статического сайта через nginx (один контейнер на прод + стейджинг).
# Каталоги sites/prod и sites/dev доставляются отдельно (rsync из CI):
#   emercoin.com      -> /sites/prod   (master-ветка)
#   dev.emercoin.com  -> /sites/dev    (dev-ветка)
services:
  nginx:
    image: nginx:1.19.2-alpine
    container_name: emer_nginx_static
    restart: always
    volumes:
      - ./nginx/static-nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/static.conf:/etc/nginx/conf.d/site.conf:ro
      - ./sites:/sites:ro
    ports:
      - "80:80"
