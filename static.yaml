# Раздача статического сайта (dist/) через nginx. Без Postgres/gunicorn.
# dist/ доставляется на сервер отдельно (rsync из CI).
version: '3.6'

services:
  nginx:
    image: nginx:1.19.2-alpine
    container_name: emer_nginx_static
    restart: always
    volumes:
      - ./nginx/static-nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/static.conf:/etc/nginx/conf.d/site.conf:ro
      - ./dist:/site:ro
    ports:
      - "80:80"
