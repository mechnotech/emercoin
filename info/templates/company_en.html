{% extends 'blankpage_en.html' %}
{% load static %}
{% block title %}
     Emercoin + {{ company.title }}
{% endblock title %}

{% block meta %}
    {% include "misc/link-rels.html" %}
    <meta name="keywords" content="Partner, Business, {{company.title}} " />
        <meta name="description" content="About Emercoin partner company: {{company.title}}" />
        <meta property="og:title" content="Emercoin + {{ company.title }}" />
{% endblock %}

{% block content %}

<main>
   <div class="privacyPage-top">
      <h1>{{ company.title }}</h1>
      <div class="projects-back">
         <a href="{% url 'partners' %}" class="projects-back__link">All partners</a>
      </div>
   </div>
   <div class="project animate-it _animated">
      <div class="project__logo">
         <div class="project__logo-inner">
            <img src="{{ company.logo.url }}" srcset="{{ company.logo_big.url }} 2x" alt="{{ company.title }}" class="clients__image">
         </div>
      </div>
      <div class="project__body">
         <div class="project__text">
             {{ company.text_more_en|safe }}
         </div>
      </div>
   </div>

</main>
{% endblock content %}
